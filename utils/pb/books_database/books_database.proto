syntax = "proto3";

package books_database;

service BooksDatabase {
  rpc Read      (ReadRequest)         returns (ReadResponse);
  rpc Write     (WriteRequest)        returns (WriteResponse);
  rpc Increment (IncrementRequest)    returns (IncrementResponse);

  // 2PC participant RPCs driven by the executor coordinator.
  rpc Prepare (PrepareStockRequest) returns (PrepareStockResponse);
  rpc Commit  (CommitRequest)       returns (CommitResponse);
  rpc Abort   (AbortRequest)        returns (AbortResponse);
}

message ReadRequest {
  string title = 1;
}

message ReadResponse {
  int32 stock = 1;
}

message WriteRequest {
  string title = 1;
  int32 new_stock = 2;
}

message WriteResponse {
  bool success = 1;
}

message IncrementRequest {
  string title = 1;
  int32 quantity = 2;
}

message IncrementResponse {
  bool success = 1;
}

message StockItem {
  string title = 1;
  int32  quantity = 2;
}

message PrepareStockRequest {
  string   order_id = 1;
  repeated StockItem items = 2;
}

message PrepareStockResponse {
  bool   ready  = 1;
  string reason = 2;
}

message CommitRequest {
  string order_id = 1;
}

message CommitResponse {
  bool success = 1;
}

message AbortRequest {
  string order_id = 1;
}

message AbortResponse {
  bool aborted = 1;
}
