syntax = "proto3";

package books_database;

service BooksDatabase {
  rpc Read (ReadRequest) returns (ReadResponse);
  rpc Write (WriteRequest) returns (WriteResponse);
  rpc TryDecrement (TryDecrementRequest) returns (TryDecrementResponse);
  rpc Increment (IncrementRequest) returns (IncrementResponse);
}

message ReadRequest {
  string title = 1;
}

message ReadResponse {
  int32 stock = 1;
}

message WriteRequest {
  string title = 1;
  int32 new_stock = 2;
}

message WriteResponse {
  bool success = 1;
}

message TryDecrementRequest {
  string title = 1;
  int32 quantity = 2;
}

message TryDecrementResponse {
  bool success = 1;
}

message IncrementRequest {
  string title = 1;
  int32 quantity = 2;
}

message IncrementResponse {
  bool success = 1;
}
